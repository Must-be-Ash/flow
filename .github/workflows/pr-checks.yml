name: PR Checks

on:
  pull_request:
    branches: ['*']

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run check
        run: npm run check

      - name: Run type check
        run: npm run type-check

      - name: Run build
        run: npm run build
